<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Drive Workspace</title>
          <link rel="stylesheet" href="style.css">
     
</head>
<body>
    <main class="app-container">
        
        <!-- Header & Metrics -->
        <header class="app-header">
            <div class="brand-group">
                <h1 class="brand-title">Daily Drive Workspace</h1>
                <p class="brand-subtitle">Track, organize, and crush your daily routines</p>
            </div>
            <div class="metrics-card">
                <div class="completion-circle" id="completion-rate">0%</div>
                <div class="progress-details">
                    <h4 class="task-counter" id="task-count">0 Tasks</h4>
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </header>
