<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Drive Workspace</title>
           <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="container">
    
    <!-- AUTHENTICATION CONTAINER WINDOW -->
    <div id="authScreen">
      
      <!-- LOGIN VIEW -->
      <div id="loginCard" class="auth-card">
        <h2>Daily Drive Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="e.g. admin or john_dev" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" value="password123" required>
          </div>
          <button type="submit" class="btn-submit">Sign In</button>
          <div id="authError" class="error-msg hidden"></div>
        </form>
        <p style="margin-top: 15px; text-align: center; font-size: 14px;">
          Need an account? <span id="goToRegister" style="color: blue; cursor: pointer; font-weight: bold;">Sign Up here</span>
        </p>
      </div>

      <!-- REGISTRATION VIEW -->
      <div id="registerCard" class="auth-card hidden">
        <h2>Create Account</h2>
        <form id="registerForm">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label for="regUsername">Choose Username</label>
            <input type="text" id="regUsername" class="form-control" placeholder="Unique username" required>
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" class="form-control" placeholder="Create password" required>
          </div>
          <div class="form-group">
            <label for="regRole">Workspace Position / Role</label>
            <select id="regRole" class="form-control">
              <option value="Employee">Employee (View assigned tasks)</option>
              <option value="Manager">Manager (Assign & control tasks)</option>
            </select>
          </div>
          <button type="submit" class="btn-submit">Register Account</button>
          <div id="registerError" class="error-msg hidden"></div>
          <div id="registerSuccess" style="color: green; font-size: 13px; margin-top: 5px; font-weight: bold;" class="hidden">Account created! Redirecting...</div>
        </form>
        <p style="margin-top: 15px; text-align: center; font-size: 14px;">
          Already have an account? <span id="goToLogin" style="color: blue; cursor: pointer; font-weight: bold;">Login here</span>
        </p>
      </div>

    </div>

    <!-- MAIN APP INTERFACE SCREEN -->
    <div id="workspaceScreen" class="hidden">
      
      <!-- Top Session Navbar -->
      <div class="header-bar">
        <div>
          <h1>Daily Drive Workspace</h1>
          <p>Welcome, <span id="userDisplay" class="user-badge"></span> (<span id="roleDisplay"></span>)</p>
        </div>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>

      <!-- Live Calculation Metrics Component -->
      <div class="progress-container">
        <div class="progress-label">
          <span>Daily Completion Score</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <!-- Core Engine Layout Split Grid -->
      <div class="workspace-grid">
        
        <!-- Input Form Section -->
        <div class="card" id="formCard">
          <h3 id="formTitle" class="form-group">Create New Task</h3>
          <form id="taskForm">
            <input type="hidden" id="taskIdField">
            
            <div class="form-group">
              <label for="taskTitle">Task Title</label>
              <input type="text" id="taskTitle" class="form-control" placeholder="What needs to be done?" required>
              <div id="titleError" class="error-msg hidden">Title cannot be left blank.</div>
            </div>

            <div class="form-group">
              <label for="taskCategory">Category</label>
              <select id="taskCategory" class="form-control">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Study">Study</option>
                <option value="Health">Health</option>
                <option value="Finance">Finance</option>
              </select>
            </div>

            <div class="form-group" id="assignmentGroup">
              <label for="taskAssignment">Assign To Employee</label>
              <select id="taskAssignment" class="form-control"></select>
            </div>

            <button type="submit" id="submitTaskBtn" class="btn-submit">Add Task</button>
          </form>
        </div>

        <!-- Render Filtering Display Elements & Stack -->
        <div>
          <div class="card filter-bar">
            <div class="filter-tabs" id="statusTabs">
              <button class="tab-btn active" data-status="All">All</button>
              <button class="tab-btn" data-status="Pending">Pending</button>
              <button class="tab-btn" data-status="Completed">Completed</button>
            </div>
            
            <div class="category-filter-wrapper">
              <label for="filterCategory">Category:</label>
              <select id="filterCategory" class="form-control category-select-compact">
                <option value="All">All Categories</option>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Study">Study</option>
                <option value="Health">Health</option>
                <option value="Finance">Finance</option>
              </select>
            </div>
          </div>

          <!-- Dynamic Task Output Stack -->
          <ul id="taskList" class="task-list"></ul>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
