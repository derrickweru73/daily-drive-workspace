<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Drive Workspace</title>
          <link rel="stylesheet" href="style.css">
     
</head>
<body>
    <main class="app-container">
        
        <!-- Header & Metrics -->
        <header class="app-header">
            <div class="brand-group">
                <h1 class="brand-title">Daily Drive Workspace</h1>
                <p class="brand-subtitle">Track, organize, and crush your daily routines</p>
            </div>
            <div class="metrics-card">
                <div class="completion-circle" id="completion-rate">0%</div>
                <div class="progress-details">
                    <h4 class="task-counter" id="task-count">0 Tasks</h4>
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Workspace Layout -->
        <section class="workspace-layout">
            <!-- Left Sidebar Form Panel -->
            <div class="panel form-panel">
                <h2 class="panel-title">Manage Workspace</h2>
                <form id="task-form" class="task-form">
                    <div class="form-group">
                        <label class="form-label">Task Title</label>
                        <input type="text" id="task-input" placeholder="What needs to be done?" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="category-select" class="form-select">
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Study">Study</option>
                            <option value="Health">Health</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                    <button type="submit" id="form-submit-btn" class="btn btn-primary">Add Task</button>
                </form>
            </div>

            <!-- Right Dashboard Tasks Section -->
            <div class="dashboard-panel">
                <div class="filter-bar">
                    <div class="status-tabs">
                        <button data-status-filter="all" class="tab-btn active">All</button>
                        <button data-status-filter="pending" class="tab-btn">Pending</button>
                        <button data-status-filter="completed" class="tab-btn">Completed</button>
                    </div>
                    <select id="filter-category-select" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Study">Study</option>
                        <option value="Health">Health</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>

                <!-- Live Dynamic Task Items Target Container -->
                <ul id="task-list" class="task-list"></ul>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
